<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced Web Color Sorter</title>
    <style>
        :root { --bg: #121212; --card: #1e1e1e; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); color: #e0e0e0; margin: 0; padding: 20px; }
        .controls { position: sticky; top: 0; background: var(--bg); padding: 15px 0; z-index: 10; border-bottom: 1px solid #333; margin-bottom: 20px; display: flex; gap: 8px; flex-wrap: wrap; }
        button { background: #333; color: white; border: none; padding: 8px 16px; border-radius: 20px; cursor: pointer; transition: 0.2s; font-size: 13px; }
        button:hover { background: #444; }
        button.active { background: #007bff; }
        .section-title { font-size: 1.2rem; margin: 20px 0 10px; color: #888; text-transform: uppercase; letter-spacing: 1px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 12px; }
        .color-card { background: var(--card); border-radius: 12px; overflow: hidden; border: 1px solid #333; transition: transform 0.2s; }
        .color-card:hover { transform: translateY(-3px); border-color: #555; }
        .swatch { height: 70px; width: 100%; }
        .info { padding: 8px; font-size: 11px; }
        .info b { display: block; margin-bottom: 4px; color: #fff; font-size: 12px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    </style>
</head>
<body>

    <div class="controls" id="filter-bar">
        <button onclick="filterColors('all')" class="active">All Colors</button>
        <button onclick="filterColors('reds')">Reds</button>
        <button onclick="filterColors('greens')">Greens</button>
        <button onclick="filterColors('blues')">Blues</button>
        <button onclick="filterColors('warm')">Warm (Yellow/Orange)</button>
        <button onclick="filterColors('cool')">Cool (Purple/Cyan)</button>
        <button onclick="filterColors('neutrals')">Neutrals Only</button>
    </div>

    <div id="app-content">
        <div class="section-title" id="sec-chroma">Vibrant Colors (Sorted by Hue)</div>
        <div id="chromatic-grid" class="grid"></div>
        
        <div class="section-title" id="sec-neutral">Neutrals (Low Saturation)</div>
        <div id="neutral-grid" class="grid"></div>
    </div>

    <script>
        const cssColors = {"AliceBlue":"#f0f8ff","AntiqueWhite":"#faebd7","Aqua":"#00ffff","Aquamarine":"#7fffd4","Azure":"#f0ffff","Beige":"#f5f5dc","Bisque":"#ffe4c4","Black":"#000000","BlanchedAlmond":"#ffebcd","Blue":"#0000ff","BlueViolet":"#8a2be2","Brown":"#a52a2a","BurlyWood":"#deb887","CadetBlue":"#5f9ea0","Chartreuse":"#7fff00","Chocolate":"#d2691e","Coral":"#ff7f50","CornflowerBlue":"#6495ed","Cornsilk":"#fff8dc","Crimson":"#dc143c","Cyan":"#00ffff","DarkBlue":"#00008b","DarkCyan":"#008b8b","DarkGoldenRod":"#b8860b","DarkGray":"#a9a9a9","DarkGrey":"#a9a9a9","DarkGreen":"#006400","DarkKhaki":"#bdb76b","DarkMagenta":"#8b008b","DarkOliveGreen":"#556b2f","DarkOrange":"#ff8c00","DarkOrchid":"#9932cc","DarkRed":"#8b0000","DarkSalmon":"#e9967a","DarkSeaGreen":"#8fbc8f","DarkSlateBlue":"#483d8b","DarkSlateGray":"#2f4f4f","DarkSlateGrey":"#2f4f4f","DarkTurquoise":"#00ced1","DarkViolet":"#9400d3","DeepPink":"#ff1493","DeepSkyBlue":"#00bfff","DimGray":"#696969","DimGrey":"#696969","DodgerBlue":"#1e90ff","FireBrick":"#b22222","FloralWhite":"#fffaf0","ForestGreen":"#228b22","Fuchsia":"#ff00ff","Gainsboro":"#dcdcdc","GhostWhite":"#f8f8ff","Gold":"#ffd700","GoldenRod":"#daa520","Gray":"#808080","Grey":"#808080","Green":"#008000","GreenYellow":"#adff2f","HoneyDew":"#f0fff0","HotPink":"#ff69b4","IndianRed":"#cd5c5c","Indigo":"#4b0082","Ivory":"#fffff0","Khaki":"#f0e68c","Lavender":"#e6e6fa","LavenderBlush":"#fff0f5","LawnGreen":"#7cfc00","LemonChiffon":"#fffacd","LightBlue":"#add8e6","LightCoral":"#f08080","LightCyan":"#e0ffff","LightGoldenRodYellow":"#fafad2","LightGray":"#d3d3d3","LightGrey":"#d3d3d3","LightGreen":"#90ee90","LightPink":"#ffb6c1","LightSalmon":"#ffa07a","LightSeaGreen":"#20b2aa","LightSkyBlue":"#87cefa","LightSlateGray":"#778899","LightSlateGrey":"#778899","LightSteelBlue":"#b0c4de","LightYellow":"#ffffe0","Lime":"#00ff00","LimeGreen":"#32cd32","Linen":"#faf0e6","Magenta":"#ff00ff","Maroon":"#800000","MediumAquaMarine":"#66cdaa","MediumBlue":"#0000cd","MediumOrchid":"#ba55d3","MediumPurple":"#9370db","MediumSeaGreen":"#3cb371","MediumSlateBlue":"#7b68ee","MediumSpringGreen":"#00fa9a","MediumTurquoise":"#48d1cc","MediumVioletRed":"#c71585","MidnightBlue":"#191970","MintCream":"#f5fffa","MistyRose":"#ffe4e1","Moccasin":"#ffe4b5","NavajoWhite":"#ffdead","Navy":"#000080","OldLace":"#fdf5e6","Olive":"#808000","OliveDrab":"#6b8e23","Orange":"#ffa500","OrangeRed":"#ff4500","Orchid":"#da70d6","PaleGoldenRod":"#eee8aa","PaleGreen":"#98fb98","PaleTurquoise":"#afeeee","PaleVioletRed":"#db7093","PapayaWhip":"#ffefd5","PeachPuff":"#ffdab9","Peru":"#cd853f","Pink":"#ffc0cb","Plum":"#dda0dd","PowderBlue":"#b0e0e6","Purple":"#800080","RebeccaPurple":"#663399","Red":"#ff0000","RosyBrown":"#bc8f8f","RoyalBlue":"#4169e1","SaddleBrown":"#8b4513","Salmon":"#fa8072","SandyBrown":"#f4a460","SeaGreen":"#2e8b57","SeaShell":"#fff5ee","Sienna":"#a0522d","Silver":"#c0c0c0","SkyBlue":"#87ceeb","SlateBlue":"#6a5acd","SlateGray":"#708090","SlateGrey":"#708090","Snow":"#fffafa","SpringGreen":"#00ff7f","SteelBlue":"#4682b4","Tan":"#d2b48c","Teal":"#008080","Thistle":"#d8bfd8","Tomato":"#ff6347","Turquoise":"#40e0d0","Violet":"#ee82ee","Wheat":"#f5deb3","White":"#ffffff","WhiteSmoke":"#f5f5f5","Yellow":"#ffff00","YellowGreen":"#9acd32"};

        function hexToHSL(hex) {
            let r = parseInt(hex.slice(1,3), 16) / 255;
            let g = parseInt(hex.slice(3,5), 16) / 255;
            let b = parseInt(hex.slice(5,7), 16) / 255;
            let max = Math.max(r, g, b), min = Math.min(r, g, b);
            let h, s, l = (max + min) / 2;
            if (max == min) { h = s = 0; } 
            else {
                let d = max - min;
                s = l > 0.5 ? d / (2 - max - min) : d / (max + min);
                switch (max) {
                    case r: h = (g - b) / d + (g < b ? 6 : 0); break;
                    case g: h = (b - r) / d + 2; break;
                    case b: h = (r - g) / d + 4; break;
                }
                h /= 6;
            }
            return { h: h * 360, s: s * 100, l: l * 100 };
        }

        const colorData = Object.entries(cssColors).map(([name, hex]) => {
            return { name, hex, hsl: hexToHSL(hex) };
        }).sort((a, b) => a.hsl.h - b.hsl.h || a.hsl.l - b.hsl.l);

        function renderGrid(filter = 'all') {
            const chromGrid = document.getElementById('chromatic-grid');
            const neutGrid = document.getElementById('neutral-grid');
            chromGrid.innerHTML = '';
            neutGrid.innerHTML = '';

            colorData.forEach(c => {
                let match = false;
                const h = c.hsl.h;
                const s = c.hsl.s;

                if (filter === 'all') match = true;
                else if (filter === 'reds') match = (h > 340 || h <= 20);
                else if (filter === 'greens') match = (h > 80 && h <= 160);
                else if (filter === 'blues') match = (h > 180 && h <= 260);
                else if (filter === 'warm') match = (h > 20 && h <= 80);
                else if (filter === 'cool') match = (h > 160 && h <= 340);
                else if (filter === 'neutrals') match = (s < 12);

                if (!match) return;

                const card = `
                    <div class="color-card">
                        <div class="swatch" style="background:${c.name}"></div>
                        <div class="info">
                            <b>${c.name}</b>
                            H:${Math.round(h)}° S:${Math.round(s)}% L:${Math.round(c.hsl.l)}%
                        </div>
                    </div>`;
                
                if (s < 12) {
                    neutGrid.innerHTML += card;
                } else {
                    chromGrid.innerHTML += card;
                }
            });

            // Toggle section visibility
            document.getElementById('sec-neutral').style.display = neutGrid.innerHTML ? 'block' : 'none';
            document.getElementById('sec-chroma').style.display = chromGrid.innerHTML ? 'block' : 'none';
        }

        function filterColors(type) {
            document.querySelectorAll('button').forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');
            renderGrid(type);
        }

        renderGrid();
    </script>
</body>
</html>
